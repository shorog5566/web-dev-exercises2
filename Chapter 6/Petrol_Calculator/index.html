<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Petrol Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>⛽ Petrol Calculator</h1>
            <p class="subtitle">Calculate the total cost of your petrol purchase</p>
        </header>
        <main>
            <form id="petrolForm">
                <div class="form-group">
                    <label for="costPerLiter">Cost per Liter (£):</label>
                    <input 
                        type="number" 
                        id="costPerLiter" 
                        name="costPerLiter" 
                        min="0" 
                        step="0.01" 
                        value="1.72"
                        placeholder="Enter cost per liter"
                    >
                </div>
                <div class="form-group">
                    <label for="litersPurchased">Liters Purchased:</label>
                    <input 
                        type="number" 
                        id="litersPurchased" 
                        name="litersPurchased" 
                        min="0" 
                        step="0.01" 
                        value="0"
                        placeholder="Enter number of liters"
                    >
                </div>
                <div class="button-container">
                    <button type="button" id="calculateBtn" class="calculate-btn">Calculate Total Cost</button>
                </div>
            </form>
            <div class="result-container">
                <p id="totalCostResult" class="result-text"></p>
            </div>
        </main>
        <footer>
            <p>&copy; 2026 Petrol Calculator. All rights reserved.</p>
        </footer>
    </div>
    <script src="index.js"></script>
</body>
</html>
