<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Petrol Calculator</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    
    <header>
      <h1>Petrol Calculator</h1>
      <p class="subtitle">Calculate your fuel cost easily</p>
    </header>

    <main>
      <div class="form-group">
        <label for="costPerLiter">Price per litre (£)</label>
        <input id="costPerLiter" type="number" min="0" step="0.01" value="1.72">
      </div>

      <div class="form-group">
        <label for="litersPurchased">Litres</label>
        <input id="litersPurchased" type="number" min="0" step="0.01" value="0">
      </div>

      <div class="button-container">
        <button id="calculateBtn" class="calculate-btn">Calculate</button>
      </div>

      <div class="result-container">
        <p id="totalCostResult" class="result-text">Enter values and click Calculate</p>
      </div>
    </main>

    <footer>
      <p>&copy; 2026 Petrol Calculator</p>
    </footer>

  </div>

  <script src="index.js"></script>
</body>
</html>
